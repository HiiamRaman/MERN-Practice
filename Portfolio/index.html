<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script
      src="https://kit.fontawesome.com/08d33b209b.js"
      crossorigin="anonymous"
    ></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PortFolio Project</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <nav
      class="flex bg-gray-300 p-5 h-20 gap-5 justify-between items-center relative sticky top-0 z-100"
    >
      <div class="flex items-center gap-3">
        <img
          class="h-16 w-16 rounded-full border-1"
          src="File/food_6.png"
          alt="Profile-picture"
        />
        <p class="font-semibold text-xl text-gray-700">Raman</p>
      </div>
      <div class="flex gap-8">
        <ul class="flex gap-5 items-center">
          <li>Home</li>
          <li> About Me</li>
          <li>Project</li>
          <li> Experience</li>
          <li> Contact Me</li>
        </ul>

        <button class="text-red-500 bg-white p-2 rounded-md shadow-md">
          Hire me
        </button>
      </div>
    </nav>
    <section class="mx-20 my-40">
      <div class="flex w-full gap-15">
        <div class="w-1/2 flex flex-col justify-between">
          <div class="">
            <p class="font-bold text-gray-700 tracking-wider">
              Welcome to my world
            </p>
            <h1 class="font-bold p-6 text-4xl text-gray-700">
              Hi I am <span class="text-red-500">Raman</span> ,<br />
              learning how to <span class="text-red-500">Code</span>!!
            </h1>
            <p class="text-gray-500 font-semibold">
              Lorem ipsum dolor, sit amet consectetur adipisicing elit. Nam
              culpa molestias commodi id odio illo et ducimus      earum
              quidem.
            </p>
          </div>

          <div class="flex gap-40 font-semibold text-lg text-gray-500">
            <div class="flex flex-col gap-3">
              <p>Find WIth Me</p>
              <div class="flex gap-4">
                <i class="fa-brands fa-linkedin"></i>
                <i class="fa-brands fa-facebook"></i>
                <i class="fa-brands fa-instagram"></i>
              </div>
            </div>
            <div class="flex flex-col gap-3">
              <p>Best Skills</p>
              <div class="flex gap-4">
                <i class="fa-brands fa-twitter"></i>
                <i class="fa-brands fa-figma"></i>
                <i class="fa-solid fa-diamond"></i>
              </div>
            </div>
          </div>
        </div>

        <div class="w-1/2">
          <img
            class="h-100 w-80 object-cover rounded-lg shadow-md hover:shadow-2xl hover:scale-102 transition"
            src="/File/profile.jpg"
            alt="Profile-picture"
          />
        </div>
      </div>
    </section>
  </body>
</html>
